<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alos Louis - Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
    }
    .hero-bg { 
      background: linear-gradient(135deg, #1e2937 0%, #334155 100%); 
    }
    .dark .hero-bg { 
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); 
    }

    /* Mobile Menu Animation Tối Ưu */
    #mobile-menu {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: top center;
      will-change: transform, opacity;
    }
    #mobile-menu.open {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    #mobile-menu:not(.open) {
      opacity: 0;
      transform: translateY(-20px) scale(0.95);
    }

    nav a {
      transition: all 0.2s ease;
    }
    #menu-btn {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-white/90 dark:bg-gray-950/90 backdrop-blur-md z-50 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-6xl mx-auto px-6 py-4">
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Alos Louis</h1>

        <!-- Desktop Menu -->
        <div class="hidden md:flex space-x-8 text-lg">
          <a href="#about" class="text-gray-700 hover:text-blue-600 dark:text-gray-300 dark:hover:text-blue-400">Về tôi</a>
          <a href="#skills" class="text-gray-700 hover:text-blue-600 dark:text-gray-300 dark:hover:text-blue-400">Kỹ năng</a>
          <a href="#projects" class="text-gray-700 hover:text-blue-600 dark:text-gray-300 dark:hover:text-blue-400">Dự án</a>
          <a href="#contact" class="text-gray-700 hover:text-blue-600 dark:text-gray-300 dark:hover:text-blue-400">Liên hệ</a>
        </div>

        <div class="flex items-center gap-4">
          <!-- Theme Toggle -->
          <button id="theme-toggle" class="text-2xl p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all duration-300 hover:rotate-12 active:scale-90">
            <i class="fa-solid fa-moon transition-transform duration-500"></i>
          </button>

          <!-- Hamburger -->
          <button id="menu-btn" class="md:hidden text-3xl text-gray-700 dark:text-white">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </div>

      <!-- Mobile Menu -->
      <div id="mobile-menu" class="hidden md:hidden mt-4 py-6 border-t border-gray-200 dark:border-gray-700">
        <div class="flex flex-col space-y-6 text-lg px-2">
          <a href="#about" class="hover:text-blue-600 dark:hover:text-blue-400 py-2 block">Về tôi</a>
          <a href="#skills" class="hover:text-blue-600 dark:hover:text-blue-400 py-2 block">Kỹ năng</a>
          <a href="#projects" class="hover:text-blue-600 dark:hover:text-blue-400 py-2 block">Dự án</a>
          <a href="#contact" class="hover:text-blue-600 dark:hover:text-blue-400 py-2 block">Liên hệ</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero-bg min-h-screen flex items-center pt-20">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h2 class="text-5xl md:text-7xl font-bold mb-6">Xin chào, tôi là <span class="text-blue-400">Alos Louis</span></h2>
      <p class="text-2xl md:text-3xl text-gray-300 mb-8">Lập trình viên Web • Freelancer</p>
      <p class="max-w-2xl mx-auto text-lg text-gray-300 mb-10">
        Tôi đam mê xây dựng những trang web đẹp, nhanh và thân thiện với người dùng.
      </p>
      <div class="flex justify-center gap-6">
        <a href="#contact" class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-full text-lg font-medium transition">Liên hệ ngay</a>
        <a href="#projects" class="border border-gray-400 hover:border-white px-8 py-4 rounded-full text-lg font-medium transition">Xem dự án</a>
      </div>
    </div>
  </section>

  <footer class="py-8 text-center text-gray-500 dark:text-gray-400">
    © 2026 Alos Louis. Made with ❤️
  </footer>

  <script>
    // Theme Toggle
    const themeToggle = document.getElementById('theme-toggle');
    const icon = themeToggle.querySelector('i');
    const html = document.documentElement;

    function setTheme(theme) {
      if (theme === 'dark') {
        html.classList.add('dark');
        icon.classList.replace('fa-moon', 'fa-sun');
        icon.classList.add('rotate-180');
        localStorage.theme = 'dark';
      } else {
        html.classList.remove('dark');
        icon.classList.replace('fa-sun', 'fa-moon');
        icon.classList.remove('rotate-180');
        localStorage.theme = 'light';
      }
    }

    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      setTheme('dark');
    } else {
      setTheme('light');
    }

    themeToggle.addEventListener('click', () => {
      themeToggle.style.transform = 'rotate(180deg)';
      setTimeout(() => {
        if (html.classList.contains('dark')) setTheme('light');
        else setTheme('dark');
        themeToggle.style.transform = 'rotate(0deg)';
      }, 180);
    });

    // Mobile Menu Animation Tối Ưu
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    let isOpen = false;

    menuBtn.addEventListener('click', () => {
      isOpen = !isOpen;

      if (isOpen) {
        mobileMenu.classList.remove('hidden');
        requestAnimationFrame(() => {
          mobileMenu.classList.add('open');
        });
        menuBtn.innerHTML = `<i class="fa-solid fa-xmark"></i>`;
        menuBtn.classList.add('rotate-90');
      } else {
        mobileMenu.classList.remove('open');
        setTimeout(() => {
          mobileMenu.classList.add('hidden');
        }, 400);
        menuBtn.innerHTML = `<i class="fa-solid fa-bars"></i>`;
        menuBtn.classList.remove('rotate-90');
      }
    });

    // Đóng menu khi click vào link
    document.querySelectorAll('#mobile-menu a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        setTimeout(() => mobileMenu.classList.add('hidden'), 400);
        menuBtn.innerHTML = `<i class="fa-solid fa-bars"></i>`;
        menuBtn.classList.remove('rotate-90');
        isOpen = false;
      });
    });
  </script>
</body>
</html>
