<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Alos Louis - Portfolio cá nhân">
  <title>Alos Louis | Full-Stack Developer</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      scroll-behavior: smooth;
      cursor: none;
    }

    /* Parallax Background */
    .hero-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      position: relative;
      overflow: hidden;
    }

    .parallax-layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.1s linear;
      will-change: transform;
    }

    .layer-1 { background-image: url('https://picsum.photos/id/1015/2000/1200'); opacity: 0.15; }
    .layer-2 { background-image: url('https://picsum.photos/id/201/2000/1200'); opacity: 0.1; }
    .layer-3 { background-image: url('https://picsum.photos/id/237/2000/1200'); opacity: 0.08; }

    /* Custom Cursor */
    #custom-cursor {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 2px solid rgb(59 130 246);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: width 0.2s, height 0.2s;
    }

    .trail-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      background: rgb(147 197 253);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      opacity: 0;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">

  <!-- Custom Cursor -->
  <div id="custom-cursor"></div>

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-white/90 dark:bg-gray-950/90 backdrop-blur-lg z-50 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-2xl font-bold">Alos Louis</h1>
      
      <div class="hidden md:flex items-center gap-8 text-lg">
        <a href="#about" class="cursor-hover hover:text-blue-600 transition">Về tôi</a>
        <a href="#skills" class="cursor-hover hover:text-blue-600 transition">Kỹ năng</a>
        <a href="#projects" class="cursor-hover hover:text-blue-600 transition">Dự án</a>
        <a href="#contact" class="cursor-hover hover:text-blue-600 transition">Liên hệ</a>
      </div>

      <div class="flex items-center gap-4">
        <button id="theme-toggle" class="cursor-hover text-2xl p-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 transition">
          <i class="fa-solid fa-moon"></i>
        </button>
        <button id="menu-btn" class="md:hidden text-3xl cursor-hover">☰</button>
      </div>
    </div>
  </nav>

  <!-- Hero with Parallax -->
  <section id="hero" class="hero-bg min-h-screen flex items-center relative">
    <!-- Parallax Layers -->
    <div class="parallax-layer layer-1" id="layer1"></div>
    <div class="parallax-layer layer-2" id="layer2"></div>
    <div class="parallax-layer layer-3" id="layer3"></div>

    <div class="max-w-6xl mx-auto px-6 text-center relative z-10 pt-20">
      <h2 class="text-5xl md:text-7xl font-bold mb-6">Xin chào, mình là <span class="text-blue-400">Alos Louis</span></h2>
      <p class="text-2xl md:text-3xl text-gray-400 mb-8">Full-Stack Developer</p>
      <p class="max-w-2xl mx-auto text-lg text-gray-300 mb-12">Tạo ra những website đẹp, nhanh và mang lại giá trị thực sự.</p>
      
      <div class="flex flex-wrap justify-center gap-5">
        <a href="#projects" class="cursor-hover px-8 py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-medium text-lg transition">Xem Dự Án</a>
        <a href="#contact" class="cursor-hover px-8 py-4 border-2 border-white/70 hover:bg-white/10 rounded-2xl font-medium text-lg transition">Liên hệ</a>
      </div>
    </div>
  </section>

  <!-- Các section khác -->
  <section id="about" class="py-24 bg-white dark:bg-gray-900">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12">Về tôi</h2>
      <!-- Nội dung về tôi -->
    </div>
  </section>

  <footer class="py-10 text-center text-gray-500 text-sm">
    © 2026 Alos Louis • Made with ❤️
  </footer>

  <script>
    // Parallax Effect
    const layer1 = document.getElementById('layer1');
    const layer2 = document.getElementById('layer2');
    const layer3 = document.getElementById('layer3');

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      
      layer1.style.transform = `translateY(${scrollY * 0.2}px)`;
      layer2.style.transform = `translateY(${scrollY * 0.35}px)`;
      layer3.style.transform = `translateY(${scrollY * 0.5}px)`;
    });

    // Custom Cursor + Trail
    const cursor = document.getElementById('custom-cursor');
    const trails = [];
    const trailCount = 8;

    for (let i = 0; i < trailCount; i++) {
      const dot = document.createElement('div');
      dot.className = 'trail-dot';
      document.body.appendChild(dot);
      trails.push(dot);
    }

    let mouseX = 0, mouseY = 0;
    let prevX = 0, prevY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';

      trails.forEach((dot, index) => {
        const delay = index * 8;
        dot.style.left = (prevX + (mouseX - prevX) * (index / trailCount)) + 'px';
        dot.style.top = (prevY + (mouseY - prevY) * (index / trailCount)) + 'px';
        dot.style.opacity = (1 - index / trailCount) * 0.6;
      });

      prevX = mouseX;
      prevY = mouseY;
    });

    // Hover effect
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.style.transform = 'translate(-50%, -50%) scale(1.8)');
      el.addEventListener('mouseleave', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');
    });

    // Theme Toggle
    const themeToggle = document.getElementById('theme-toggle');
    const icon = themeToggle.querySelector('i');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        icon.classList.replace('fa-sun', 'fa-moon');
        localStorage.theme = 'light';
      } else {
        html.classList.add('dark');
        icon.classList.replace('fa-moon', 'fa-sun');
        localStorage.theme = 'dark';
      }
    }

    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      html.classList.add('dark');
      icon.classList.replace('fa-moon', 'fa-sun');
    }

    themeToggle.addEventListener('click', toggleTheme);
  </script>
</body>
</html>
