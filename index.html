<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alos Louis | Full-Stack Developer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; scroll-behavior: smooth; cursor: none; }

    /* LOADING SCREEN */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at center, #1e2937 0%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 1s ease;
    }

    .loader {
      text-align: center;
    }

    .loader-spinner {
      width: 80px;
      height: 80px;
      border: 4px solid rgba(147, 197, 253, 0.2);
      border-top: 4px solid #60a5fa;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin: 0 auto 20px;
    }

    .loader-text {
      color: #93c5fd;
      font-size: 1.1rem;
      letter-spacing: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .hero-bg {
      background: radial-gradient(circle at center, #1e2937 0%, #0f172a 70%);
      position: relative;
      overflow: hidden;
    }

    canvas#particles { 
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      z-index: 1; 
      opacity: 0.85;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">LOADING UNIVERSE...</div>
    </div>
  </div>

  <!-- Custom Cursor -->
  <div id="custom-cursor"></div>

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-white/90 dark:bg-gray-950/90 backdrop-blur-lg z-50 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <h1 class="text-2xl font-bold">Alos Louis</h1>
      <div class="hidden md:flex items-center gap-8 text-lg">
        <a href="#about" class="cursor-hover hover:text-blue-400 transition">Về tôi</a>
        <a href="#skills" class="cursor-hover hover:text-blue-400 transition">Kỹ năng</a>
        <a href="#projects" class="cursor-hover hover:text-blue-400 transition">Dự án</a>
        <a href="#contact" class="cursor-hover hover:text-blue-400 transition">Liên hệ</a>
      </div>
      <button id="theme-toggle" class="cursor-hover text-2xl p-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 transition">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <section id="hero" class="hero-bg min-h-screen flex items-center relative">
    <canvas id="particles"></canvas>

    <div class="max-w-6xl mx-auto px-6 text-center relative z-10 pt-20 content">
      <h2 class="text-5xl md:text-7xl font-bold mb-6 text-white">Xin chào, mình là <span class="text-blue-400">Alos Louis</span></h2>
      <p class="text-2xl md:text-3xl text-gray-300 mb-8">Full-Stack Developer</p>
      <p class="max-w-2xl mx-auto text-lg text-gray-400 mb-12">Khám phá vũ trụ code cùng mình...</p>
    </div>
  </section>

  <!-- Các section khác -->
  <section id="about" class="py-24 bg-white dark:bg-gray-900">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h2 class="text-4xl font-bold mb-12">Về tôi</h2>
      <p class="max-w-2xl mx-auto text-lg">Lập trình viên đam mê công nghệ và thiết kế những trải nghiệm tuyệt vời.</p>
    </div>
  </section>

  <footer class="py-10 text-center text-gray-500 text-sm">
    © 2026 Alos Louis • Made with ❤️
  </footer>

  <script>
    // ============== LOADING ANIMATION ==============
    window.addEventListener('load', () => {
      const loadingScreen = document.getElementById('loading-screen');
      loadingScreen.style.opacity = '0';
      
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 1000);
    });

    // ============== PARTICLES ==============
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: 0, y: 0, radius: 180 };

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2.2 + 0.8;
        this.speedX = Math.random() * 0.5 - 0.25;
        this.speedY = Math.random() * 0.5 - 0.25;
      }
      update() {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.hypot(dx, dy);
        if (dist < mouse.radius && dist > 0) {
          this.speedX += (dx / dist) * 1.1;
          this.speedY += (dy / dist) * 1.1;
        }
        this.x += this.speedX;
        this.y += this.speedY;
      }
      draw() {
        ctx.fillStyle = `rgba(147, 197, 253, 0.9)`;
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#60a5fa";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      const count = window.innerWidth < 768 ? 90 : 180;
      for (let i = 0; i < count; i++) particles.push(new Particle());
    }

    function animate() {
      ctx.fillStyle = 'rgba(15, 23, 42, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    });

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initParticles();
    animate();

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    // Theme Toggle
    const themeToggle = document.getElementById('theme-toggle');
    const icon = themeToggle.querySelector('i');
    const html = document.documentElement;

    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        icon.classList.replace('fa-sun', 'fa-moon');
        localStorage.theme = 'light';
      } else {
        html.classList.add('dark');
        icon.classList.replace('fa-moon', 'fa-sun');
        localStorage.theme = 'dark';
      }
    }
    themeToggle.addEventListener('click', toggleTheme);
  </script>
</body>
</html>
